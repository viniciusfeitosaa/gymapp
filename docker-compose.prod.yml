# Gym Code — Stack de produção para homelab (Mac Mini / servidor local)
# Uso: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: gymapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gymapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-gymapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gymapp} -d ${POSTGRES_DB:-gymapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gymapp-internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    container_name: gymapp-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-gymapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gymapp}
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
      SMTP_HOST: ${SMTP_HOST:-maddy}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-noreply@mygymcode.com}
      SMTP_PASS: ${SMTP_PASS:-${MADDY_SMTP_PASS:-}}
      SMTP_FROM: ${SMTP_FROM:-noreply@mygymcode.com}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      SUBSCRIPTION_PRODUCT_ID: ${SUBSCRIPTION_PRODUCT_ID:-gymcode_pro_monthly}
      APPLE_APP_SHARED_SECRET: ${APPLE_APP_SHARED_SECRET:-}
      APPLE_SANDBOX: ${APPLE_SANDBOX:-0}
      STORE_BILLING_SANDBOX_TRUST: ${STORE_BILLING_SANDBOX_TRUST:-0}
      GOOGLE_PLAY_PACKAGE_NAME: ${GOOGLE_PLAY_PACKAGE_NAME:-com.gymcode.app}
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}
    volumes:
      - gymapp_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      maddy:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - gymapp-internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_APP_URL: ${VITE_APP_URL:-http://localhost}
    container_name: gymapp-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - gymapp-internal

  caddy:
    image: caddy:2-alpine
    container_name: gymapp-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - gymapp-internal

  maddy:
    image: foxcpp/maddy:0.7
    container_name: gymapp-maddy
    restart: unless-stopped
    hostname: mail.mygymcode.com
    environment:
      SMTP_RELAY_HOST: ${SMTP_RELAY_HOST:-}
      SMTP_RELAY_PORT: ${SMTP_RELAY_PORT:-587}
      SMTP_RELAY_USER: ${SMTP_RELAY_USER:-}
      SMTP_RELAY_PASS: ${SMTP_RELAY_PASS:-}
    volumes:
      - maddy_data:/data
      - ./infra/maddy/maddy.active.conf:/data/maddy.conf:ro
    networks:
      - gymapp-internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gymapp-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    environment:
      TUNNEL_TRANSPORT_PROTOCOL: ${TUNNEL_TRANSPORT_PROTOCOL:-quic}
    volumes:
      - ./infra/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./infra/cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      - caddy
    networks:
      - gymapp-internal
    profiles:
      - tunnel

volumes:
  postgres_data:
    name: gymapp_postgres_data
  maddy_data:
    name: gymapp_maddy_data
  gymapp_uploads:
    name: gymapp_uploads

networks:
  gymapp-internal:
    name: gymapp-internal
    driver: bridge
