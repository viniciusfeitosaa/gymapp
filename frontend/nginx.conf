server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Landing na raiz — mygymcode.com/ (URL profissional, sem /landing nem index.html)
    location = / {
        root /usr/share/nginx/html/landing;
        try_files /index.html =404;
    }

    # Antigos caminhos /landing → raiz
    location = /landing/index.html {
        return 301 /$is_args$args;
    }

    location ~ ^/landing/?$ {
        return 301 /$is_args$args;
    }

    # Assets da landing (CSS, JS, imagens) em /landing/*
    location ^~ /landing/ {
        try_files $uri =404;
    }

    # SPA — login, cadastro, área logada
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
